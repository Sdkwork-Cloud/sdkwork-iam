syntax = "proto3";

package sdkwork.common.v1;

option java_package = "com.sdkwork.common.v1";
option java_multiple_files = true;
option go_package = "github.com/sdkwork/rpc-go/sdkwork/common/v1;commonv1";

message Decimal {
  string value = 1;
  int32 precision = 2;
  int32 scale = 3;
}

message Money {
  string amount = 1;
  string currency = 2;
}
