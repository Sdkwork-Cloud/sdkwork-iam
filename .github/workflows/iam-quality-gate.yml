name: IAM Quality Gate

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  iam-quality-gate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run IAM static quality gate
        run: pnpm run check

      - name: Run IAM governance
        run: pnpm run test:governance-node

      - name: Run IAM standard contracts
        run: pnpm run test:iam-standard-contracts

      - name: Run governed Rust workspace tests
        run: pnpm run test:rust-workspace
