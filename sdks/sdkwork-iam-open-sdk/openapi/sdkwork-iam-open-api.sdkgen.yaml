          },
          "email": {
            "type": "string",
            "description": "Super-admin email credential for bootstrap body authentication."
          },
          "phone": {
            "type": "string",
            "description": "Super-admin phone credential for bootstrap body authentication."
          },
          "password": {
            "type": "string",
            "format": "password",
            "description": "Super-admin password credential for bootstrap body authentication."
          },
          "ownerTenantId": {
            "type": "string"
          },
          "appKey": {
            "type": "string"
          },
          "name": {
            "type": "string"
          },
          "displayName": {
            "type": "string"
          },
          "appType": {
            "type": "string"
          },
          "packageName": {
            "type": "string"
          },
          "bundleId": {
            "type": "string"
          },
          "desktopAppId": {
            "type": "string"
          },
          "version": {
