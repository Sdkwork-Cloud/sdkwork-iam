        "type": "object",
        "additionalProperties": true,
        "description": "Operation-specific command payload defined by the owning IAM Rust module."
      },
      "WechatMiniProgramSessionCreateCommand": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "jsCode"
        ],
