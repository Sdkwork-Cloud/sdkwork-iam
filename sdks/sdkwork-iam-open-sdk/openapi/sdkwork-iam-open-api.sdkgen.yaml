            "type": "string"
          },
          "defaultAccessPermissions": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "string"
            }
          },
          "config": {
            "type": "object",
            "additionalProperties": true
          },
          "packages": {
            "type": "array",
            "items": {
              "type": "object",
