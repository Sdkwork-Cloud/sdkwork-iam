schemaVersion: 1
kind: sdkwork.iam.capability.catalog
standardVersion: 2026-06-24
purpose: >
  Canonical SDKWork IAM capability catalog. IAM domain code, IMF registry,
  database module, HTTP/RPC authorities, and generated SDK families live in
  sdkwork-iam.

capabilities:
  - id: iam
    domain: iam
    status: standardizing
    maturity: L3
    targetMaturity: L3
    priority: P0
    owner: sdkwork-iam
    scope:
      - auth
      - session
      - app-context
      - sharding-context
      - tenant
      - organization
      - user
      - permission
      - api-key-subject
      - token-store
    requiredLayers:
      - kind: contracts
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-contracts
        manifest: package.json
      - kind: sdk_ports
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-sdk-ports
        manifest: package.json
      - kind: service
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-service
        manifest: package.json
      - kind: service
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-application-bootstrap
        manifest: package.json
      - kind: runtime
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-runtime
        manifest: package.json
      - kind: native_rust_core
        path: crates/sdkwork-iam-context-service
        manifest: Cargo.toml
      - kind: native_rust_web_adapter
        path: crates/sdkwork-iam-web-adapter
        manifest: Cargo.toml
      - kind: native_rust_route_app_api
        path: crates/sdkwork-routes-iam-app-api
        manifest: Cargo.toml
      - kind: native_rust_route_backend_api
        path: crates/sdkwork-routes-iam-backend-api
        manifest: Cargo.toml
      - kind: native_rust_route_open_api
        path: crates/sdkwork-routes-iam-open-api
        manifest: Cargo.toml
      - kind: native_rust_rpc
        path: crates/sdkwork-iam-rpc-rust
        manifest: Cargo.toml
      - kind: rpc_contracts
        path: apps/sdkwork-iam-common/packages/sdkwork-iam-rpc-contracts
        manifest: package.json
      - kind: sdk_app
        path: sdks/sdkwork-iam-app-sdk
        manifest: specs/component.spec.json
      - kind: sdk_backend
        path: sdks/sdkwork-iam-backend-sdk
        manifest: specs/component.spec.json
      - kind: sdk_open
        path: sdks/sdkwork-iam-open-sdk
        manifest: specs/component.spec.json
      - kind: native_rust_storage_sqlx
        path: crates/sdkwork-iam-directory-repository-sqlx
        manifest: Cargo.toml
      - kind: pc_react
        path: apps/sdkwork-iam-pc/packages/sdkwork-iam-react
        manifest: package.json
    qualityGates:
      - category: contract
        command: pnpm --filter @sdkwork/iam-contracts test
      - category: runtime
        command: pnpm --filter @sdkwork/iam-runtime test
      - category: bootstrap
        command: pnpm --filter @sdkwork/iam-application-bootstrap test
      - category: storage
        command: cargo test -p sdkwork-iam-directory-repository-sqlx
      - category: web_framework
        command: cargo test -p sdkwork-iam-web-adapter
      - category: open_api
        command: cargo test -p sdkwork-routes-iam-open-api
      - category: frontend
        command: pnpm --filter @sdkwork/iam-react typecheck
    integration:
      domainForksForbidden: true
      sdkBoundary: generated-sdk-through-ports
      appResponsibility: >
        Applications define domain roles and route guards; they must not fork
        session, token, tenant, organization, permission, or subject context
        runtime.

  - id: iam-application-registry
    domain: iam
    status: standardizing
    maturity: L2
    targetMaturity: L3
    priority: P0
    owner: sdkwork-iam
    scope:
      - registered-applications
      - tenant_applications
      - access_credentials
      - application-bootstrap
    requiredLayers:
      - kind: native_rust_storage_sqlx
        path: crates/sdkwork-iam-directory-repository-sqlx
        manifest: Cargo.toml
      - kind: native_rust_web_adapter
        path: crates/sdkwork-iam-web-adapter
        manifest: Cargo.toml
    qualityGates:
      - category: storage
        command: cargo test -p sdkwork-iam-directory-repository-sqlx
      - category: adapter
        command: cargo test -p sdkwork-iam-web-adapter
      - category: router
        command: cargo test -p sdkwork-routes-iam-backend-api
    integration:
      domainForksForbidden: true
      sdkBoundary: generated-sdk-through-ports
      appResponsibility: >
        Applications provide sdkwork.app.config.json and tenant-specific domain
        configuration. sdkwork-iam owns registered applications, tenant
        applications, and delegated access credential issuance.
