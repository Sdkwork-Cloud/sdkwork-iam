schemaVersion: 1
kind: sdkwork.iam.surface.completeness
standardVersion: 2026-06-24
purpose: >
  Living completeness matrix for sdkwork-iam across database, API, SDK, and client
  surfaces. Status values: complete, partial, scaffold, missing.

ratingScale:
  complete: End-to-end wired with operator/user UI where applicable and tests
  partial: Backend or controller exists; UI or cross-surface parity incomplete
  scaffold: Composition/contracts only; no capability UI
  missing: Not started or intentionally out of scope for the surface

database:
  status: complete
  tables: 57
  baseline: database/ddl/baseline/postgres/0001_iam_baseline.sql
  migrations: database/migrations/postgres/

api:
  backend-api:
    status: complete
    authority: apis/backend-api/iam/sdkwork-iam-backend-api.openapi.yaml
    router: crates/sdkwork-routes-iam-backend-api/
    postgresIntegrationTests: crates/sdkwork-routes-iam-backend-api/tests/iam_backend_postgres_integration.rs
    authenticatedRoundtrip: backend_postgres_authenticated_user_list_roundtrip
  app-api:
    status: complete
    authority: apis/app-api/iam/sdkwork-iam-app-api.openapi.yaml
    router: crates/sdkwork-routes-iam-app-api/
  open-api:
    status: complete
    scope: oauth-authorization-server
    authority: apis/open-api/iam/sdkwork-iam-open-api.openapi.yaml

sdks:
  typescript:
    app: complete
    backend: complete
    open: complete
  otherLanguages:
    status: missing
    note: Spec declares multi-language; only TypeScript artifacts materialized in repo

capabilities:
  - id: auth-session
    database: complete
    backend-api: missing-by-design
    app-api: complete
    open-api: partial
    pc-app: complete
    pc-admin: n/a
    pc-console: n/a
    h5-app: partial
    flutter-app: partial

  - id: tenant
    database: complete
    backend-api: complete
    app-api: missing-by-design
    pc-app: partial
    pc-admin: complete
    pc-console: complete
    h5-app: missing
    flutter-app: missing

  - id: organization
    database: complete
    backend-api: complete
    app-api: partial
    pc-app: partial
    pc-admin: complete
    pc-console: complete
    h5-app: missing
    flutter-app: missing

  - id: permission
    database: complete
    backend-api: complete
    app-api: partial
    pc-app: missing
    pc-admin: complete
    pc-console: missing-by-design
    h5-app: missing
    flutter-app: missing

  - id: oauth
    database: complete
    backend-api: complete
    app-api: complete
    open-api: complete
    pc-app: partial
    pc-admin: complete
    pc-console: missing-by-design
    h5-app: missing
    flutter-app: missing

  - id: user-directory
    database: complete
    backend-api: complete
    app-api: partial
    pc-app: partial
    pc-admin: complete
    pc-console: missing-by-design
    h5-app: missing
    flutter-app: missing

  - id: account-binding
    database: partial
    backend-api: complete
    app-api: complete
    pc-app: partial
    pc-admin: complete
    pc-console: complete
    h5-app: partial
    flutter-app: partial

  - id: user-center
    database: complete
    backend-api: complete
    app-api: partial
    pc-app: complete
    pc-admin: missing-by-design
    pc-console: complete
    h5-app: partial
    flutter-app: partial
    notes: Profile, password, and verification policy on H5/Flutter/PC console; local preferences remain PC app-only

priorityBacklog:
  p0: []
  p1:
    - PC app-side naming migration (sdkwork-iam-pc-auth, sdkwork-iam-pc-user-center targets)
    - Wire sendVerifyCode through iam-service when app-api verification endpoints are materialized
  p2:
    - Multi-language SDK materialization
    - Dedicated iam_account_binding tables vs iam_policy composition

verification:
  - pnpm run verify
  - pnpm run test:iam-standard-contracts
  - cargo test --workspace
