syntax = "proto3";

package sdkwork.common.v1;

option java_package = "com.sdkwork.common.v1";
option java_multiple_files = true;
option go_package = "github.com/sdkwork/rpc-go/sdkwork/common/v1;commonv1";

message AppContext {
  string tenant_id = 1;
  string organization_id = 2;
  string user_id = 3;
  string session_id = 4;
  string app_id = 5;
  string deployment_mode = 6;
  string environment = 7;
  string surface_profile = 8;
}

message CallerContext {
  string actor_id = 1;
  string actor_type = 2;
  string service_id = 3;
  string auth_level = 4;
  repeated string permission_scope = 5;
  repeated string data_scope = 6;
}
