syntax = "proto3";

package sdkwork.common.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.sdkwork.common.v1";
option java_multiple_files = true;
option go_package = "github.com/sdkwork/rpc-go/sdkwork/common/v1;commonv1";

message RequestMetadata {
  string request_id = 1;
  string trace_parent = 2;
  string idempotency_key = 3;
  string request_hash = 4;
  string client_version = 5;
}

message ResponseMetadata {
  string request_id = 1;
  string trace_id = 2;
  google.protobuf.Timestamp server_time = 3;
  repeated string warnings = 4;
  repeated string deprecation_notices = 5;
}

message RuntimeCapability {
  string name = 1;
  string version = 2;
  bool enabled = 3;
}

message RpcMethodManifest {
  string method_name = 1;
  string operation_id = 2;
  string auth_policy = 3;
  bool requires_idempotency = 4;
  string streaming_mode = 5;
}

message RpcServiceManifest {
  string package_name = 1;
  string service_name = 2;
  string surface = 3;
  string owner_domain = 4;
  string version = 5;
  repeated RpcMethodManifest methods = 6;
}
