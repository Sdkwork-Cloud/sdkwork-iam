mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "127.0.0.1:3900"

[cors]
allowAnyOrigin = false
allowedOrigins = ["https://iam.sdkwork.com"]

[request]
maxBodyBytes = 8388608
timeoutMs = 30000

[readiness]
checkUpstreams = true
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = true
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = ["iam.sdkwork.com", "api.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[security.waf]
enabled = true
mode = "block"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = true

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 256
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = true
maxAttempts = 2
retryStatuses = [502, 503, 504]
retryBackoffMs = 100
circuitBreakerEnabled = true
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
